name: Build OnePlus Ace 3V (audi) Make Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出你的 GitHub 仓库 (为了获取你上传的 audi_defconfig)
        uses: actions/checkout@v4

      - name: 2. 清理空间
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean

      - name: 3. 安装系统依赖
        run: |
            echo "========================================="
            echo "📦 安装编译依赖..."
            echo "========================================="
            sudo apt-get update
            sudo apt-get install -y \
                bc bison build-essential curl flex git gnupg gperf \
                libncurses-dev libssl-dev libelf-dev \
                python3 python3-pip zip unzip wget \
                lld llvm binutils-aarch64-linux-gnu \
                crossbuild-essential-arm64 cpio dwarves

      - name: Setup AOSP Clang Toolchain
        run: |
            echo "========================================="
            echo "🔧 下载 AOSP Clang ${CLANG_VERSION}..."
            echo "========================================="
            mkdir -p ~/toolchains

            # 下载 AOSP Clang 预编译工具链
            CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-${CLANG_VERSION}.tar.gz"
            mkdir -p ~/toolchains/clang
            cd ~/toolchains/clang
            curl -sSL "${CLANG_URL}" | tar xz || {
            echo "⚠️ AOSP Clang 下载失败, 尝试使用 ZyC Clang..."
            cd ~/toolchains
            rm -rf clang
            # 使用备用的 ZyC Clang (兼容性更好的第三方工具链)
            git clone --depth=1 https://gitlab.com/nickel-za/nickel-clang.git clang || {
                echo "⚠️ ZyC Clang 也失败, 使用 Proton Clang..."
                git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
            }
            }

            # 下载 GCC 交叉编译工具链 (用于部分汇编)
            echo "下载 aarch64 GCC..."
            GCC_URL="https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/main.tar.gz"
            mkdir -p ~/toolchains/gcc-aarch64
            cd ~/toolchains/gcc-aarch64
            curl -sSL "${GCC_URL}" | tar xz 2>/dev/null || {
            echo "⚠️ AOSP GCC 下载失败，使用系统自带交叉编译器"
            }

            echo "✅ 工具链准备完毕"
            ls -la ~/toolchains/clang/bin/ | head -5

      - name: 5. 拉取源码并修复破损链接与头文件 (核心难点突破)
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/android_kernel
          cd ${GITHUB_WORKSPACE}/android_kernel
          
          git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8650.git
          git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8650-modules.git
          git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8650-devicetrees.git
          
          cd android_kernel_oneplus_sm8650
          
          echo "========================================="
          echo "🔧 手术 1：自动重连破损的模块符号链接"
          echo "========================================="
          # 查找所有死链并强行重新指向我们刚刚克隆好的同级目录
          find . -type l ! -exec test -e {} \; -print | while read broken_link; do
            target=$(readlink "$broken_link")
            if [[ "$target" == *"sm8650-modules"* ]]; then
              if [[ "$target" == *"sm8650-modules" ]]; then subpath=""; else subpath="${target#*sm8650-modules/}"; fi
              rm "$broken_link"
              ln -s "${GITHUB_WORKSPACE}/android_kernel/android_kernel_oneplus_sm8650-modules/$subpath" "$broken_link"
            elif [[ "$target" == *"sm8650-devicetrees"* ]]; then
              if [[ "$target" == *"sm8650-devicetrees" ]]; then subpath=""; else subpath="${target#*sm8650-devicetrees/}"; fi
              rm "$broken_link"
              ln -s "${GITHUB_WORKSPACE}/android_kernel/android_kernel_oneplus_sm8650-devicetrees/$subpath" "$broken_link"
            fi
          done

          echo "========================================="
          echo "🔧 手术 2：跨仓库救援缺失的 Device Tree 头文件"
          echo "========================================="
          # 为主内核创建存放外部配置的专属路径
          mkdir -p include/bindings
          mkdir -p include/dt-bindings
          
          # 1. 精准狙击报错的 qcom,audio-ext-clk.h
          AUDIO_H=$(find ../ -name "qcom,audio-ext-clk.h" | head -n 1)
          if [ -n "$AUDIO_H" ]; then
            AUDIO_DIR=$(dirname "$AUDIO_H")
            echo "✅ 发现音频核心头文件目录: $AUDIO_DIR"
            # 将该目录下的所有音频头文件强行灌入主内核的 include/bindings/
            cp -rn "$AUDIO_DIR"/* include/bindings/ 2>/dev/null || true
          fi
          
          # 2. 防御性操作：把外部仓库里所有的设备树定义 (dt-bindings) 全部复制过来防报错
          echo "✅ 正在同步全局外部设备树头文件..."
          find ../android_kernel_oneplus_sm8650-modules ../android_kernel_oneplus_sm8650-devicetrees -type d -name "dt-bindings" -exec cp -rn {}/* include/dt-bindings/ \; 2>/dev/null || true
          find ../android_kernel_oneplus_sm8650-modules ../android_kernel_oneplus_sm8650-devicetrees -type d -name "bindings" -exec cp -rn {}/* include/bindings/ \; 2>/dev/null || true
          
          echo "头文件救援手术完成！"

      - name: 6. 初始化配置并注入 Docker 魔法
        run: |
          export PATH="${GITHUB_WORKSPACE}/toolchain/clang/bin:$PATH"
          export KBUILD_COMPILER_STRING="$(clang --version | head -n 1)"
          
          cd ${GITHUB_WORKSPACE}/android_kernel/android_kernel_oneplus_sm8650
          
          echo "将你提取的原厂 audi_defconfig 复制到内核的 configs 目录中..."
          cp ${GITHUB_WORKSPACE}/audi_defconfig arch/arm64/configs/audi_defconfig
          
          echo "生成初始配置文件..."
          make O=out ARCH=arm64 LLVM=1 \
            CONFIG_OPLUS_DEVICE_DTBS=y \
            CONFIG_AUDI_DTB=y \
            audi_defconfig

      - name: 7. 编译核心内核 (Image & DTBs)
        run: |
          export PATH="${GITHUB_WORKSPACE}/toolchain/clang/bin:$PATH"
          cd ${GITHUB_WORKSPACE}/android_kernel/android_kernel_oneplus_sm8650
          
          echo "========================================="
          echo "🎯 终极猎杀方案：修复 DTC 编译器的盲区"
          echo "========================================="
          # 【核心破局点】: DTC 预处理器默认不会读取根目录的 include/！
          # 必须将缺失的外部头文件放入 DTC 专用的 include 路径。
          DTC_BINDINGS="arch/arm64/boot/dts/include/bindings"
          DTC_DT_BINDINGS="arch/arm64/boot/dts/include/dt-bindings"
          PREFIX_BINDINGS="scripts/dtc/include-prefixes/bindings"
          
          mkdir -p $DTC_BINDINGS
          mkdir -p $DTC_DT_BINDINGS
          mkdir -p $PREFIX_BINDINGS
          
          # 同步创建 out 目录结构 (针对 O=out)
          mkdir -p out/$DTC_BINDINGS
          mkdir -p out/$DTC_DT_BINDINGS
          mkdir -p out/$PREFIX_BINDINGS

          echo "🔍 正在全局搜索并扁平化提取所有的设备树头文件..."
          # 扁平化拷贝：直接找 .h 文件并强行拍平放入目标目录，无视外部仓库原本繁杂的文件夹嵌套
          find ../android_kernel_oneplus_sm8650-modules ../android_kernel_oneplus_sm8650-devicetrees -type f -name "*.h" | grep -iE "bindings|audio" | while read file; do
            cp "$file" $DTC_BINDINGS/ 2>/dev/null || true
            cp "$file" $DTC_DT_BINDINGS/ 2>/dev/null || true
            cp "$file" $PREFIX_BINDINGS/ 2>/dev/null || true
            
            cp "$file" out/$DTC_BINDINGS/ 2>/dev/null || true
            cp "$file" out/$DTC_DT_BINDINGS/ 2>/dev/null || true
            cp "$file" out/$PREFIX_BINDINGS/ 2>/dev/null || true
          done

          # 验证是否成功抓到了报错的这几个核心文件
          echo "✅ 检查音频和 GPR 头文件是否已注入 DTC 视野："
          ls -l $DTC_BINDINGS/qcom,audio-ext-clk.h || echo "❌ 依然没有找到 audio-ext-clk.h!"
          ls -l $DTC_BINDINGS/qcom,gpr.h || echo "❌ 依然没有找到 gpr.h!"

          echo "========================================="
          echo "🚀 环境拼接完美，正式开始安全编译！"
          echo "========================================="
          # 增加 DTC_INCLUDE 环境变量作为最后一道保险
          make O=out ARCH=arm64 LLVM=1 \
            CONFIG_OPLUS_DEVICE_DTBS=y \
            CONFIG_AUDI_DTB=y \
            DTC_INCLUDE="${GITHUB_WORKSPACE}/android_kernel/android_kernel_oneplus_sm8650/arch/arm64/boot/dts/include" \
            -j$(nproc)

      - name: 8. 编译外部驱动模块 (复活 Wi-Fi 和音频的核心步骤)
        run: |
          export PATH="${GITHUB_WORKSPACE}/toolchain/clang/bin:$PATH"
          cd ${GITHUB_WORKSPACE}/android_kernel/android_kernel_oneplus_sm8650
          
          echo "开始编译外部驱动模块..."
          make O=out ARCH=arm64 LLVM=1 \
            CONFIG_OPLUS_DEVICE_DTBS=y \
            CONFIG_AUDI_DTB=y \
            M=../android_kernel_oneplus_sm8650-modules \
            modules -j$(nproc)

      - name: 9. Package with AnyKernel3
        run: |
            echo "========================================="
            echo "📦 终极方案：补全 Wi-Fi 驱动 + 强制 boot 分区"
            echo "========================================="
            # 1. 克隆 AnyKernel3
            git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel3
            cd anykernel3
            
            # 2. 下载工具链 (沿用你的 64位 方案)
            echo "下载 64位 busybox 和 magiskboot..."
            curl -sSL "https://raw.githubusercontent.com/osm0sis/AnyKernel3/arm64-tools/busybox" -o tools/busybox
            curl -sSL "https://raw.githubusercontent.com/osm0sis/AnyKernel3/arm64-tools/magiskboot" -o tools/magiskboot
            
            chmod -R 777 tools
            rm -rf .git .github README.md

            # 3. 创建驱动存放目录 (现代 GKI 驱动通常存放在 vendor_dlkm)
            mkdir -p modules/vendor_dlkm/lib/modules/

            # 4. 写入适配配置 (已修改为 do.modules=1 并保持你的 BLOCK 风格)
            printf '%s\n' \
            '# AnyKernel3 Ramdisk Mod Script' \
            '# OnePlus Ace 3V (audi/porsche) - GKI' \
            '' \
            '## AnyKernel setup' \
            "properties() { '" \
            'kernel.string=LineageOS Kernel for OnePlus Ace 3V' \
            'do.devicecheck=0' \
            'do.modules=1' \
            'do.systemless=1' \
            'do.cleanup=1' \
            'do.cleanuponabort=0' \
            'device.name1=audi' \
            'device.name2=porsche' \
            'device.name3=OP5D3FL1' \
            'device.name4=PJZ110' \
            'supported.versions=' \
            'supported.patchlevels=' \
            "'; }" \
            '' \
            '## AnyKernel boot install' \
            'BLOCK=boot;' \
            'IS_SLOT_DEVICE=1;' \
            'RAMDISK_COMPRESSION=auto;' \
            'PATCH_VBMETA_FLAG=auto;' \
            '' \
            '. tools/ak3-core.sh;' \
            '' \
            'dump_boot;' \
            'write_boot;' \
            '## end boot install' \
            > anykernel.sh

            # 5. 查找并拷贝内核镜像
            KERNEL_IMAGE=""
            if [ -f "../msm-kernel/out/arch/arm64/boot/Image" ]; then
                KERNEL_IMAGE="../msm-kernel/out/arch/arm64/boot/Image"
            elif [ -f "../msm-kernel/out/arch/arm64/boot/Image.gz" ]; then
                KERNEL_IMAGE="../msm-kernel/out/arch/arm64/boot/Image.gz"
            fi

            if [ -n "$KERNEL_IMAGE" ]; then
                echo "✅ 找到内核镜像: $KERNEL_IMAGE"
                cp "$KERNEL_IMAGE" ./
            else
                echo "❌ 找不到编译好的内核镜像!"
                exit 1
            fi

            # 6. 搜集 Wi-Fi 驱动 (.ko 文件)
            # 在整个 android_kernel 目录下搜索刚才编译出的模块并放入打包路径
            echo "🔍 正在搜集 .ko 驱动模块..."
            find ../ -name "*.ko" -type f -exec cp {} modules/vendor_dlkm/lib/modules/ \;
            
            # 校验是否搜集到了驱动
            if [ "$(ls -A modules/vendor_dlkm/lib/modules/)" ]; then
                echo "✅ 成功搜集到驱动模块"
            else
                echo "⚠️ 未发现驱动模块，Wi-Fi 可能无法工作"
            fi

            # 7. 创建刷机包
            zip -r9 ../Kernel-LineageOS-Ace3V-$(date +%Y%m%d).zip * -x '*.git*'
            
            # 8. 存一份裸 Image 备份
            cp "$KERNEL_IMAGE" ../Image-LineageOS-Ace3V-$(date +%Y%m%d)

      - name: 10. 上传刷机包
        uses: actions/upload-artifact@v4
        with:
            name: Custom-Kernel-And-Modules
            path: |
                Kernel-LineageOS-Ace3V-*.zip
                Kernel-Modules-Ace3V-*.zip