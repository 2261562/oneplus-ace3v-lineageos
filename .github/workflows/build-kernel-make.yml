name: Build OnePlus Ace 3V (audi) Make Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出你的 GitHub 仓库 (为了获取你上传的 audi_defconfig)
        uses: actions/checkout@v4

      - name: 2. 清理空间
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean

      - name: 3. 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf liblz4-tool libncurses-dev libssl-dev libxml2 libxml2-utils lzop rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

      - name: 4. 拉取极客圈顶级编译器 (ZyC-Clang 18)
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/toolchain
          cd ${GITHUB_WORKSPACE}/toolchain
          git clone --depth=1 https://github.com/ZyC-X/zyc-clang.git clang

      - name: 5. 拉取 LineageOS 源码 (仅需核心、模块与设备树)
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/android_kernel
          cd ${GITHUB_WORKSPACE}/android_kernel
          
          # 拉取 LineageOS 23.2 分支的源码
          git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8650.git
          git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8650-modules.git
          git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8650-devicetrees.git
          
          # 建立符号链接，让内核能找到设备树和模块
          cd android_kernel_oneplus_sm8650
          ln -s ../android_kernel_oneplus_sm8650-modules vendor_modules
          ln -s ../android_kernel_oneplus_sm8650-devicetrees vendor_devicetrees

      - name: 6. 初始化配置并注入 Docker 魔法
        run: |
          export PATH="${GITHUB_WORKSPACE}/toolchain/clang/bin:$PATH"
          export KBUILD_COMPILER_STRING="$(clang --version | head -n 1)"
          
          cd ${GITHUB_WORKSPACE}/android_kernel/android_kernel_oneplus_sm8650
          
          echo "将你提取的原厂 audi_defconfig 复制到内核的 configs 目录中..."
          cp ${GITHUB_WORKSPACE}/audi_defconfig arch/arm64/configs/audi_defconfig
          
          echo "生成初始配置文件..."
          make O=out ARCH=arm64 LLVM=1 \
            CONFIG_OPLUS_DEVICE_DTBS=y \
            CONFIG_AUDI_DTB=y \
            audi_defconfig

      - name: 7. 编译核心内核 (Image)
        run: |
          export PATH="${GITHUB_WORKSPACE}/toolchain/clang/bin:$PATH"
          cd ${GITHUB_WORKSPACE}/android_kernel/android_kernel_oneplus_sm8650
          
          echo "开始编译核心内核..."
          make O=out ARCH=arm64 LLVM=1 \
            CONFIG_OPLUS_DEVICE_DTBS=y \
            CONFIG_AUDI_DTB=y \
            -j$(nproc)

      - name: 8. 编译外部驱动模块 (复活 Wi-Fi 和音频的核心步骤)
        run: |
          export PATH="${GITHUB_WORKSPACE}/toolchain/clang/bin:$PATH"
          cd ${GITHUB_WORKSPACE}/android_kernel/android_kernel_oneplus_sm8650
          
          echo "开始编译外部驱动模块..."
          make O=out ARCH=arm64 LLVM=1 \
            CONFIG_OPLUS_DEVICE_DTBS=y \
            CONFIG_AUDI_DTB=y \
            M=../android_kernel_oneplus_sm8650-modules \
            modules -j$(nproc)

      - name: 9. Package with AnyKernel3
        run: |
        echo "========================================="
        echo "📦 终极方案：补全 Wi-Fi 驱动 + 强制 boot 分区"
        echo "========================================="
        # 1. 克隆 AnyKernel3
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel3
        cd anykernel3
        
        # 2. 下载工具链 (沿用你的 64位 方案)
        echo "下载 64位 busybox 和 magiskboot..."
        curl -sSL "https://raw.githubusercontent.com/osm0sis/AnyKernel3/arm64-tools/busybox" -o tools/busybox
        curl -sSL "https://raw.githubusercontent.com/osm0sis/AnyKernel3/arm64-tools/magiskboot" -o tools/magiskboot
        
        chmod -R 777 tools
        rm -rf .git .github README.md

        # 3. 创建驱动存放目录 (现代 GKI 驱动通常存放在 vendor_dlkm)
        mkdir -p modules/vendor_dlkm/lib/modules/

        # 4. 写入适配配置 (已修改为 do.modules=1 并保持你的 BLOCK 风格)
        printf '%s\n' \
        '# AnyKernel3 Ramdisk Mod Script' \
        '# OnePlus Ace 3V (audi/porsche) - GKI' \
        '' \
        '## AnyKernel setup' \
        "properties() { '" \
        'kernel.string=LineageOS Kernel for OnePlus Ace 3V' \
        'do.devicecheck=0' \
        'do.modules=1' \
        'do.systemless=1' \
        'do.cleanup=1' \
        'do.cleanuponabort=0' \
        'device.name1=audi' \
        'device.name2=porsche' \
        'device.name3=OP5D3FL1' \
        'device.name4=PJZ110' \
        'supported.versions=' \
        'supported.patchlevels=' \
        "'; }" \
        '' \
        '## AnyKernel boot install' \
        'BLOCK=boot;' \
        'IS_SLOT_DEVICE=1;' \
        'RAMDISK_COMPRESSION=auto;' \
        'PATCH_VBMETA_FLAG=auto;' \
        '' \
        '. tools/ak3-core.sh;' \
        '' \
        'dump_boot;' \
        'write_boot;' \
        '## end boot install' \
        > anykernel.sh

        # 5. 查找并拷贝内核镜像
        KERNEL_IMAGE=""
        if [ -f "../msm-kernel/out/arch/arm64/boot/Image" ]; then
            KERNEL_IMAGE="../msm-kernel/out/arch/arm64/boot/Image"
        elif [ -f "../msm-kernel/out/arch/arm64/boot/Image.gz" ]; then
            KERNEL_IMAGE="../msm-kernel/out/arch/arm64/boot/Image.gz"
        fi

        if [ -n "$KERNEL_IMAGE" ]; then
            echo "✅ 找到内核镜像: $KERNEL_IMAGE"
            cp "$KERNEL_IMAGE" ./
        else
            echo "❌ 找不到编译好的内核镜像!"
            exit 1
        fi

        # 6. 搜集 Wi-Fi 驱动 (.ko 文件)
        # 在整个 android_kernel 目录下搜索刚才编译出的模块并放入打包路径
        echo "🔍 正在搜集 .ko 驱动模块..."
        find ../ -name "*.ko" -type f -exec cp {} modules/vendor_dlkm/lib/modules/ \;
        
        # 校验是否搜集到了驱动
        if [ "$(ls -A modules/vendor_dlkm/lib/modules/)" ]; then
            echo "✅ 成功搜集到驱动模块"
        else
            echo "⚠️ 未发现驱动模块，Wi-Fi 可能无法工作"
        fi

        # 7. 创建刷机包
        zip -r9 ../Kernel-LineageOS-Ace3V-$(date +%Y%m%d).zip * -x '*.git*'
        
        # 8. 存一份裸 Image 备份
        cp "$KERNEL_IMAGE" ../Image-LineageOS-Ace3V-$(date +%Y%m%d)

      - name: 10. 上传刷机包
        uses: actions/upload-artifact@v4
        with:
            name: Custom-Kernel-And-Modules
            path: |
            Kernel-LineageOS-Ace3V-*.zip
            Kernel-Modules-Ace3V-*.zip