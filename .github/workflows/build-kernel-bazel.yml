name: Build OnePlus Ace 3V (audi) Kernel with Docker

on:
  workflow_dispatch: # 允许手动点击运行

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 终极空间清理大法 (释放约 30GB+ 空间)
        run: |
          echo "清理无用环境..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h

      - name: 2. 安装基础依赖 (适配现代 Kleaf)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
            git gnupg gperf liblz4-tool libncurses-dev libssl-dev libxml2 libxml2-utils \
            lzop rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python-is-python3

      - name: 3. 克隆 LineageOS 23.2 源码树
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/android_kernel
          cd ${GITHUB_WORKSPACE}/android_kernel
          
          echo "拉取核心内核..."
          git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8650.git msm-kernel
          
          echo "拉取驱动模块 (Wi-Fi/Audio 等)..."
          git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8650-modules.git vendor_modules
          
          echo "拉取设备树..."
          git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8650-devicetrees.git devicetrees

      - name: 4. 补全缺失的 Google Kleaf 编译底座与工具链
        run: |
          cd ${GITHUB_WORKSPACE}/android_kernel/msm-kernel
          
          echo "1. 下载 Google 官方 Kleaf 构建脚本..."
          mkdir -p build/kernel
          git clone --depth=1 https://android.googlesource.com/kernel/build build/kernel
          
          echo "2. 下载 GKI 通用内核底座..."
          git clone --depth=1 -b android14-6.1 https://android.googlesource.com/kernel/common common
          
          echo "3. 下载核心预编译工具链..."
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/build-tools prebuilts/build-tools
          git clone --depth=1 https://android.googlesource.com/kernel/prebuilts/build-tools prebuilts/kernel-build-tools
          
          echo "4. 预先下载 Clang 编译器..."
          mkdir -p prebuilts/clang/host
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 prebuilts/clang/host/linux-x86
          
          echo "5. 重建 tools/bazel 包装器..."
          mkdir -p tools
          cat << 'EOF' > tools/bazel
          #!/bin/bash
          export ROOT_DIR=$(cd $(dirname $0)/.. && pwd)
          exec ${ROOT_DIR}/build/kernel/kleaf/bazel.sh "$@"
          EOF
          chmod +x tools/bazel

      - name: 5. 注入 Docker 核心内核配置 (极客魔法)
        run: |
          cd ${GITHUB_WORKSPACE}/android_kernel/msm-kernel
          
          CONFIG_FILE="arch/arm64/configs/vendor/oplus/pineapple_GKI.config"
          
          echo "准备向 $CONFIG_FILE 注入 Docker 依赖..."
          
          cat << 'EOF' >> "$CONFIG_FILE"
          
          # ==========================================
          # Docker / 容器化核心支持补丁
          # ==========================================
          CONFIG_NAMESPACES=y
          CONFIG_USER_NS=y
          CONFIG_PID_NS=y
          CONFIG_IPC_NS=y
          CONFIG_UTS_NS=y
          CONFIG_CGROUP_NS=y
          CONFIG_CGROUPS=y
          CONFIG_MEMCG=y
          CONFIG_MEMCG_SWAP=y
          CONFIG_BLK_CGROUP=y
          CONFIG_CGROUP_SCHED=y
          CONFIG_CGROUP_PIDS=y
          CONFIG_CGROUP_FREEZER=y
          CONFIG_CGROUP_DEVICE=y
          CONFIG_CGROUP_CPUACCT=y
          CONFIG_CGROUP_BPF=y
          CONFIG_VETH=y
          CONFIG_BRIDGE=y
          CONFIG_BRIDGE_NETFILTER=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
          CONFIG_NETFILTER_XT_MATCH_IPVS=y
          CONFIG_IP_NF_NAT=y
          CONFIG_IP_NF_TARGET_MASQUERADE=y
          CONFIG_IP_NF_TARGET_NETMAP=y
          CONFIG_IP_NF_TARGET_REDIRECT=y
          CONFIG_OVERLAY_FS=y
          CONFIG_POSIX_MQUEUE=y
          CONFIG_SECCOMP=y
          CONFIG_SECCOMP_FILTER=y
          CONFIG_KEYS=y
          EOF
          
          echo "Docker 配置注入完成！"

      - name: 6. 执行 Bazel/Kleaf 编译
        run: |
          cd ${GITHUB_WORKSPACE}/android_kernel/msm-kernel
          
          echo "修复 Bazel 传统工作区标识 (WORKSPACE)..."
          if [ -f "bazel.WORKSPACE" ]; then
            cp bazel.WORKSPACE WORKSPACE
            echo "WORKSPACE 还原成功！"
          fi
          
          echo "修复 Bzlmod 模块声明..."
          if [ -f "bazel.MODULE.bazel" ]; then
            cp bazel.MODULE.bazel MODULE.bazel
          else
            echo "手搓伪造的 MODULE.bazel..."
            cat << 'EOF' > MODULE.bazel
          module(name = "msm_kernel", version = "1.0")
          bazel_dep(name = "apple_support", version = "1.15.1")
          bazel_dep(name = "dittosuite", version = "0.1.0")
          bazel_dep(name = "gbl", version = "0.1.0")
          EOF
          fi
          
          echo "清理损坏或过时的本地离线仓库..."
          rm -rf external/bazelbuild-bazel-central-registry
          
          echo "开始编译 Kernel 和 Modules..."
          # 加入 --enable_workspace 强行让 Bazel 8 读取旧版工作区配置文件！
          ./tools/bazel build --registry=https://bcr.bazel.build --config=fast --repository_disable_download=false --enable_workspace //:pineapple

      - name: 7. 准备 AnyKernel3 打包环境
        run: |
          cd ${GITHUB_WORKSPACE}
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          rm -rf AnyKernel3/.git AnyKernel3/patch AnyKernel3/ramdisk
          mkdir -p AnyKernel3/modules/vendor_dlkm/lib/modules/

      - name: 8. 收集编译产物 (Image 和 .ko 驱动)
        run: |
          cd ${GITHUB_WORKSPACE}/android_kernel/msm-kernel
          
          echo "寻找并复制 Image 内核文件..."
          find bazel-bin/ out/ -name "Image" -type f -exec cp {} ${GITHUB_WORKSPACE}/AnyKernel3/ \;
          
          echo "寻找并复制所有 .ko 驱动文件 (修复 Wi-Fi 的