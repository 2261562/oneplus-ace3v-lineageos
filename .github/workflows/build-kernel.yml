name: Build Ace 3V Kernel (LineageOS 23.2)

on:
  workflow_dispatch:
    inputs:
      KERNEL_BRANCH:
        description: '内核源码分支'
        required: true
        default: 'lineage-23.2'

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-24.04

    env:
      # 内核版本 6.1.163，需要匹配的 Clang 版本
      CLANG_VERSION: "r530567"
      KERNEL_REPO: "LineageOS/android_kernel_oneplus_sm8650"
      ARCH: arm64
      SUBARCH: arm64

    steps:
    - name: Maximize Build Space
      run: |
        echo "========================================="
        echo "🧹 释放磁盘空间..."
        echo "========================================="
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        sudo apt-get clean
        df -h

    - name: Install Build Dependencies
      run: |
        echo "========================================="
        echo "📦 安装编译依赖..."
        echo "========================================="
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential curl flex git gnupg gperf \
          libncurses-dev libssl-dev libelf-dev \
          python3 python3-pip zip unzip wget \
          lld llvm binutils-aarch64-linux-gnu \
          crossbuild-essential-arm64 cpio dwarves

    - name: Setup AOSP Clang Toolchain
      run: |
        echo "========================================="
        echo "🔧 下载 AOSP Clang ${CLANG_VERSION}..."
        echo "========================================="
        mkdir -p ~/toolchains

        # 下载 AOSP Clang 预编译工具链
        CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-${CLANG_VERSION}.tar.gz"
        mkdir -p ~/toolchains/clang
        cd ~/toolchains/clang
        curl -sSL "${CLANG_URL}" | tar xz || {
          echo "⚠️ AOSP Clang 下载失败, 尝试使用 ZyC Clang..."
          cd ~/toolchains
          rm -rf clang
          # 使用备用的 ZyC Clang (兼容性更好的第三方工具链)
          git clone --depth=1 https://gitlab.com/nickel-za/nickel-clang.git clang || {
            echo "⚠️ ZyC Clang 也失败, 使用 Proton Clang..."
            git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
          }
        }

        # 下载 GCC 交叉编译工具链 (用于部分汇编)
        echo "下载 aarch64 GCC..."
        GCC_URL="https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/main.tar.gz"
        mkdir -p ~/toolchains/gcc-aarch64
        cd ~/toolchains/gcc-aarch64
        curl -sSL "${GCC_URL}" | tar xz 2>/dev/null || {
          echo "⚠️ AOSP GCC 下载失败，使用系统自带交叉编译器"
        }

        echo "✅ 工具链准备完毕"
        ls -la ~/toolchains/clang/bin/ | head -5

    - name: Checkout Kernel Source
      uses: actions/checkout@v4
      with:
        repository: ${{ env.KERNEL_REPO }}
        ref: ${{ github.event.inputs.KERNEL_BRANCH }}
        path: msm-kernel
        fetch-depth: 1

    - name: Checkout Kernel Modules
      run: |
        echo "========================================="
        echo "📦 克隆内核模块仓库..."
        echo "========================================="
        # 内核源码中的 symlink 使用相对路径 (如 ../../../sm8650-modules/...)
        # 只要 sm8650-modules 和 msm-kernel 同级，symlink 自动生效
        #
        # $GITHUB_WORKSPACE/
        # ├── msm-kernel/        (内核源码)
        # └── sm8650-modules/    (内核模块)

        git clone --depth=1 -b ${{ github.event.inputs.KERNEL_BRANCH }} \
          https://github.com/LineageOS/android_kernel_oneplus_sm8650-modules.git \
          sm8650-modules

        echo "模块仓库内容:"
        ls sm8650-modules/

    - name: Verify Symlinks & Patch Missing Kconfigs
      run: |
        echo "========================================="
        echo "🔗 验证符号链接..."
        echo "========================================="
        cd msm-kernel

        # 验证关键 symlink 是否正确解析
        echo "--- 验证关键链接 ---"
        for link in drivers/base/kernelFwUpdate drivers/base/touchpanel_notify; do
          if [ -L "$link" ]; then
            if [ -e "$link" ]; then
              echo "  ✅ $link -> $(readlink $link)"
            else
              echo "  ❌ 断裂: $link -> $(readlink $link)"
            fi
          fi
        done

        # 统计 symlink 状态
        TOTAL=$(find . -type l 2>/dev/null | wc -l)
        BROKEN=$(find . -type l ! -exec test -e {} \; -print 2>/dev/null | wc -l)
        echo ""
        echo "  符号链接总数: $TOTAL, 断裂: $BROKEN"

        # 兜底: 对仍然缺失的 Kconfig source 引用创建空 stub
        # (可能有极少数指向其他未 clone 的仓库)
        echo ""
        echo "--- 修补残留缺失的 Kconfig ---"
        PATCHED=0
        grep -rn '^source ' --include='Kconfig' --include='Kconfig.*' . 2>/dev/null | while IFS=: read -r file line content; do
          src_path=$(echo "$content" | sed 's/^source[[:space:]]*//; s/"//g; s/'\''//g' | tr -d '[:space:]')
          if echo "$src_path" | grep -q '\$'; then
            continue
          fi
          if [ ! -f "$src_path" ]; then
            echo "  创建 stub: $src_path (被 $file 引用)"
            mkdir -p "$(dirname "$src_path")"
            echo "# 空 Kconfig stub - 源模块未 clone" > "$src_path"
          fi
        done

        echo "✅ 完成"

    - name: Integrate KernelSU
      run: |
        echo "========================================="
        echo "🔑 集成 KernelSU..."
        echo "========================================="
        cd msm-kernel

        # 使用 KernelSU 官方脚本集成到内核源码
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v3.2.2

        # 修复: setup.sh 创建 drivers/kernelsu -> KernelSU/kernel/ 的 symlink
        # 但 KernelSU/kernel/include/uapi 又是个 symlink -> ../../uapi (指向 KernelSU/uapi/)
        # O=out 编译 + 嵌套 symlink = 路径断裂
        # 解决: 手动拷贝并修复内部断裂的 symlink

        if [ -L "drivers/kernelsu" ]; then
          KSU_KERNEL_DIR=$(readlink -f "drivers/kernelsu")
          KSU_ROOT=$(dirname "$KSU_KERNEL_DIR")
          echo "KernelSU kernel dir: $KSU_KERNEL_DIR"
          echo "KernelSU root dir:   $KSU_ROOT"

          # 删除 symlink，拷贝目录（不跟随 symlink）
          rm "drivers/kernelsu"
          cp -r "$KSU_KERNEL_DIR" "drivers/kernelsu"

          # 修复内部断裂的 symlink: include/uapi -> ../../uapi
          # 实际目标是 KernelSU/uapi/
          if [ -L "drivers/kernelsu/include/uapi" ]; then
            rm "drivers/kernelsu/include/uapi"
            cp -r "$KSU_ROOT/uapi" "drivers/kernelsu/include/uapi"
            echo "✅ 已修复 include/uapi (从 $KSU_ROOT/uapi/ 拷贝)"
          fi

          # 修复其他可能断裂的 symlink
          find drivers/kernelsu -type l | while read link; do
            if [ ! -e "$link" ]; then
              target=$(readlink "$link")
              echo "  ⚠️ 断裂 symlink: $link -> $target"
            fi
          done
        fi

        # 验证集成结果
        echo "--- 验证 KernelSU 文件结构 ---"
        if [ -f "drivers/kernelsu/Kbuild" ] && [ -f "drivers/kernelsu/include/uapi/app_profile.h" ]; then
          echo "✅ KernelSU 集成成功"
          echo "Kbuild: $(wc -l < drivers/kernelsu/Kbuild) 行"
          echo "include/uapi/ 内容: $(ls drivers/kernelsu/include/uapi/)"
        else
          echo "❌ 关键文件缺失"
          echo "include/uapi 状态: $(ls -la drivers/kernelsu/include/uapi 2>&1)"
          find drivers/kernelsu/include -type f 2>/dev/null | head -20
          exit 1
        fi

    - name: Generate Defconfig
      run: |
        echo "========================================="
        echo "⚙️ 生成内核配置..."
        echo "========================================="
        cd msm-kernel

        # 设置工具链路径
        export PATH="$HOME/toolchains/clang/bin:$PATH"
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-gnu-

        # 确定使用哪个编译器
        if command -v clang &>/dev/null; then
          COMPILER="clang"
          echo "使用编译器: $(clang --version | head -1)"
        else
          echo "❌ 找不到 clang!"
          exit 1
        fi

        # 步骤1: 基于 gki_defconfig 生成基础配置
        echo ">>> 使用 gki_defconfig 作为基础..."
        make O=out ARCH=arm64 \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          LLVM=1 \
          gki_defconfig

        # 步骤2: 合并 vendor pineapple GKI 配置片段 (如果存在)
        VENDOR_FRAG="arch/arm64/configs/vendor/pineapple_GKI.config"
        if [ -f "$VENDOR_FRAG" ]; then
          echo ">>> 合并 vendor 配置片段: $VENDOR_FRAG"
          scripts/kconfig/merge_config.sh -m -O out out/.config "$VENDOR_FRAG"
        else
          echo "⚠️ 未找到 $VENDOR_FRAG，使用纯 gki_defconfig"
        fi

        echo ""
        echo "✅ 配置生成完毕"
        grep -c "=y" out/.config || true
        echo "个配置项被启用"

    - name: Compile Kernel
      run: |
        echo "========================================="
        echo "🔨 开始编译内核..."
        echo "========================================="
        cd msm-kernel

        export PATH="$HOME/toolchains/clang/bin:$PATH"

        # 获取CPU核心数
        NPROC=$(nproc --all)
        echo "使用 ${NPROC} 个线程编译"

        # 编译内核 Image
        make O=out ARCH=arm64 \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          LLVM=1 \
          -j${NPROC} \
          Image 2>&1 | tail -50

        # 检查编译结果
        if [ -f "out/arch/arm64/boot/Image" ]; then
          echo ""
          echo "✅ 内核 Image 编译成功!"
          ls -lh out/arch/arm64/boot/Image
        elif [ -f "out/arch/arm64/boot/Image.gz" ]; then
          echo ""
          echo "✅ 内核 Image.gz 编译成功!"
          ls -lh out/arch/arm64/boot/Image.gz
        else
          echo ""
          echo "❌ 编译失败: 找不到内核镜像文件"
          echo "--- 最后 100 行编译日志 ---"
          make O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 \
            -j2 Image 2>&1 | tail -100
          exit 1
        fi

    - name: Compile DTBs (Device Tree)
      run: |
        echo "========================================="
        echo "🌲 编译设备树..."
        echo "========================================="
        cd msm-kernel

        export PATH="$HOME/toolchains/clang/bin:$PATH"

        make O=out ARCH=arm64 \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          LLVM=1 \
          -j$(nproc) \
          dtbs 2>&1 | tail -20

        echo ""
        echo "--- 生成的 DTB 文件 ---"
        find out/arch/arm64/boot/dts -name "*.dtb" -o -name "*.dtbo" 2>/dev/null | head -20 || echo "无 DTB 文件"

    - name: Verify Kernel Compatibility (vermagic)
      run: |
        echo "========================================="
        echo "🔍 内核兼容性验证 (vermagic)"
        echo "========================================="
        echo ""
        echo "⚠️  刷入前必须确认以下信息与你手机上的内核完全匹配！"
        echo ""
        cd msm-kernel

        # 提取编译内核的 vermagic
        echo "=== 编译内核信息 ==="
        VERMAGIC=$(strings out/arch/arm64/boot/Image | grep -m1 "vermagic=" | sed 's/vermagic=//')
        echo "vermagic: ${VERMAGIC:-未找到}"

        # 内核版本
        KREL=$(cat out/include/config/kernel.release 2>/dev/null || echo "未找到")
        echo "kernelrelease: $KREL"

        # 编译器信息
        echo "compiler: $(strings out/arch/arm64/boot/Image | grep -m1 'Linux version' | sed 's/.*(\(.*@.*\))/\1/' | head -1)"

        # 关键配置
        echo ""
        echo "=== 关键配置 ==="
        for cfg in CONFIG_MODVERSIONS CONFIG_MODULE_SIG CONFIG_MODULE_SIG_FORCE CONFIG_LOCALVERSION CONFIG_LOCALVERSION_AUTO; do
          val=$(grep "^${cfg}=" out/.config 2>/dev/null || grep "^# ${cfg} is not set" out/.config 2>/dev/null || echo "${cfg}=未找到")
          echo "  $val"
        done

        # 完整 Linux version 字符串
        echo ""
        echo "=== 完整版本字符串 ==="
        strings out/arch/arm64/boot/Image | grep -m1 "Linux version"

        echo ""
        echo "========================================="
        echo "📱 在你的手机上执行以下命令获取当前内核信息："
        echo "========================================="
        echo ""
        echo "  adb shell cat /proc/version"
        echo "  adb shell uname -r"
        echo "  adb shell cat /proc/modules | head -5"
        echo ""
        echo "  # 提取当前 boot 分区中的 vermagic:"
        echo "  adb shell su -c 'dd if=/dev/block/by-name/boot\$(getprop ro.boot.slot_suffix) of=/data/local/tmp/boot.img'"
        echo "  adb pull /data/local/tmp/boot.img"
        echo "  strings boot.img | grep -m1 vermagic="
        echo ""
        echo "⚠️  对比上面的 vermagic 和 kernelrelease"
        echo "⚠️  如果不完全一致，请勿刷入！否则会黑屏变砖！"
        echo "========================================="

    - name: Package with AnyKernel3
      run: |
        echo "========================================="
        echo "📦 使用 AnyKernel3 打包..."
        echo "========================================="
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel3
        cd anykernel3

        # 只删除不需要的文件，保留 META-INF 和 tools 等关键目录
        rm -rf .git .github README.md

        # 配置 anykernel.sh 适配 OnePlus Ace 3V
        # SM8650 / pineapple 平台, A/B 分区, GKI 架构
        printf '%s\n' \
          '# AnyKernel3 Ramdisk Mod Script' \
          '# osm0sis @ xda-developers' \
          '# OnePlus Ace 3V (audi) - SM8650 - LineageOS' \
          '' \
          '## AnyKernel setup' \
          "properties() { '" \
          'kernel.string=LineageOS Kernel for OnePlus Ace 3V' \
          'do.devicecheck=0' \
          'do.modules=0' \
          'do.systemless=1' \
          'do.cleanup=1' \
          'do.cleanuponabort=0' \
          'device.name1=audi' \
          'device.name2=OnePlus Ace 3V' \
          'device.name3=OP5D3FL1' \
          'device.name4=PJZ110' \
          'supported.versions=' \
          'supported.patchlevels=' \
          "'; }" \
          '' \
          '## AnyKernel boot install' \
          'BLOCK=auto;' \
          'IS_SLOT_DEVICE=1;' \
          'RAMDISK_COMPRESSION=auto;' \
          'PATCH_VBMETA_FLAG=auto;' \
          '' \
          '. tools/ak3-core.sh;' \
          '' \
          'split_boot;' \
          'flash_boot;' \
          '## end boot install' \
          > anykernel.sh

        echo "--- anykernel.sh 内容 ---"
        cat anykernel.sh

        # 查找并复制内核镜像
        KERNEL_IMAGE=""
        if [ -f "../msm-kernel/out/arch/arm64/boot/Image" ]; then
          KERNEL_IMAGE="../msm-kernel/out/arch/arm64/boot/Image"
        elif [ -f "../msm-kernel/out/arch/arm64/boot/Image.gz" ]; then
          KERNEL_IMAGE="../msm-kernel/out/arch/arm64/boot/Image.gz"
        fi

        if [ -n "$KERNEL_IMAGE" ]; then
          echo "✅ 找到内核镜像: $KERNEL_IMAGE"
          cp "$KERNEL_IMAGE" ./
          ls -lh $(basename "$KERNEL_IMAGE")
        else
          echo "❌ 找不到编译好的内核镜像!"
          find ../msm-kernel/out -name "Image*" -type f 2>/dev/null
          exit 1
        fi

        # 验证 zip 结构完整性
        echo ""
        echo "--- 验证关键文件 ---"
        for f in META-INF/com/google/android/update-binary tools/ak3-core.sh anykernel.sh; do
          if [ -f "$f" ]; then
            echo "  ✅ $f"
          else
            echo "  ❌ 缺失: $f"
          fi
        done

        # 创建刷机包
        zip -r9 ../Kernel-LineageOS-Ace3V-$(date +%Y%m%d).zip * -x '*.git*'
        echo ""
        echo "✅ 刷机包已创建"
        ls -lh ../Kernel-LineageOS-Ace3V-*.zip

    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-LineageOS-Ace3V
        path: Kernel-LineageOS-Ace3V-*.zip