name: Build Ace 3V Docker Kernel (Kleaf)

on:
  workflow_dispatch:
    inputs:
      KERNEL_BRANCH:
        description: '内核源码分支'
        required: true
        default: 'lineage-23.2'

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Kernel Source
      uses: actions/checkout@v4
      with:
        repository: LineageOS/android_kernel_oneplus_sm8650
        ref: ${{ github.event.inputs.KERNEL_BRANCH }}
        path: android-kernel

    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential curl flex git gnupg gperf liblz4-tool libncurses-dev libssl-dev libxml2 libxml2-utils lzop rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 jq wget unzip
        
    - name: Inject Docker Configs into Build Script
      run: |
        cd android-kernel
        
        # 针对 Kleaf 系统，我们需要创建一个配置片段 (fragment)
        echo "Creating Docker config fragment..."
        cat << 'EOF' > docker.config
        CONFIG_NAMESPACES=y
        CONFIG_NET_NS=y
        CONFIG_PID_NS=y
        CONFIG_IPC_NS=y
        CONFIG_UTS_NS=y
        CONFIG_CGROUPS=y
        CONFIG_CGROUP_CPUACCT=y
        CONFIG_CGROUP_DEVICE=y
        CONFIG_CGROUP_FREEZER=y
        CONFIG_CGROUP_SCHED=y
        CONFIG_CPUSETS=y
        CONFIG_MEMCG=y
        CONFIG_KEYS=y
        CONFIG_VETH=y
        CONFIG_BRIDGE=y
        CONFIG_BRIDGE_NETFILTER=y
        CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
        CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
        CONFIG_NETFILTER_XT_MATCH_IPVS=y
        CONFIG_IP_NF_NAT=y
        CONFIG_NF_NAT=y
        CONFIG_POSIX_MQUEUE=y
        CONFIG_OVERLAY_FS=y
        CONFIG_SECCOMP=y
        CONFIG_BPF_SYSCALL=y
        CONFIG_CGROUP_BPF=y
        EOF
        
        # 将我们自定义的配置片段，追加到入口构建文件的末尾
        # 强制编译系统在打包最终 .config 时合并这些 Docker 选项
        echo "Injecting fragment into build.config.msm.pineapple..."
        echo "EXTRA_DEFCONFIG_FRAGMENTS=\"\${EXTRA_DEFCONFIG_FRAGMENTS} $(pwd)/docker.config\"" >> build.config.msm.pineapple
        
    - name: Compile Kernel using build_with_bazel.py
      run: |
        cd android-kernel
        
        # 使用仓库自带的 Python 构建脚本启动 Bazel 编译
        # 这里指定了 pineapple 目标和 aarch64 架构
        echo "Starting Kleaf build process..."
        BUILD_CONFIG=build.config.msm.pineapple ./build_with_bazel.py -t pineapple --aarch64
        
    - name: Package with AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git
        cd AnyKernel3
        rm -rf .git README.md *placeholder
        
        # Bazel 构建的产物通常隐藏在极其深的 out/ 目录下
        # 使用 find 命令找出刚编译好的 Image 或 Image.gz
        KERNEL_IMAGE=$(find ../android-kernel/out -name "Image" -type f | head -n 1)
        
        if [ -n "$KERNEL_IMAGE" ]; then
          echo "Found kernel image at: $KERNEL_IMAGE"
          cp "$KERNEL_IMAGE" ./
        else
          echo "Error: Could not find compiled Image!"
          exit 1
        fi
        
        zip -r9 ../Docker-Kernel-Ace3V.zip *

    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Docker-Kernel-Ace3V
        path: Docker-Kernel-Ace3V.zip